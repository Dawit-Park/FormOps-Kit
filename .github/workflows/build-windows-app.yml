name: Build Windows GUI App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build GUI executable
        run: |
          pyinstaller --onefile --windowed --name FormOpsKit --add-data "examples;examples" formops-gui.pyw
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: FormOpsKit-windows
          path: dist/FormOpsKit.exe
